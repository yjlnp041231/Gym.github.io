<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PRO Gym Log - 背部日</title>
    <style>
        :root { --accent: #3498db; --bg: #000; --card: #1c1c1e; --text: #ffffff; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 80px; }
        
        /* 顶部导航 */
        .nav { background: rgba(28, 28, 30, 0.9); backdrop-filter: blur(10px); position: sticky; top: 0; padding: 15px; text-align: center; border-bottom: 1px solid #333; z-index: 100; }
        .nav h1 { margin: 0; font-size: 18px; letter-spacing: 1px; }

        /* 组间休息计时器 */
        .timer-box { background: var(--accent); color: white; margin: 15px; padding: 15px; border-radius: 12px; text-align: center; }
        .timer-display { font-size: 32px; font-weight: bold; margin: 5px 0; }
        .timer-btn { background: white; color: var(--accent); border: none; padding: 8px 20px; border-radius: 20px; font-weight: bold; }

        /* 动作卡片 */
        .card { background: var(--card); margin: 15px; border-radius: 15px; overflow: hidden; }
        .card-header { padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        .tag { background: #333; padding: 4px 10px; border-radius: 6px; font-size: 12px; color: var(--accent); }
        
        .media-box { width: 100%; background: #2c2c2e; min-height: 220px; display: flex; align-items: center; justify-content: center; }
        .media-box img { width: 100%; height: auto; display: block; }

        .details { padding: 15px; }
        .guide { font-size: 14px; color: #aeaeb2; line-height: 1.5; margin-bottom: 15px; }
        
        /* 记录功能 */
        .log-row { display: flex; gap: 10px; margin-top: 10px; }
        .log-input { background: #2c2c2e; border: 1px solid #3d3d41; color: white; border-radius: 8px; padding: 10px; flex: 1; text-align: center; }
        
        .footer-nav { position: fixed; bottom: 0; width: 100%; background: #1c1c1e; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #333; }
        .nav-item { color: #8e8e93; font-size: 12px; text-decoration: none; }
        .active { color: var(--accent); }
    </style>
</head>
<body>

<div class="nav">
    <h1>V-TAPER BACK DAY</h1>
</div>

<div class="timer-box">
    <div style="font-size: 12px; opacity: 0.8;">组间休息计时</div>
    <div class="timer-display" id="timer">60s</div>
    <button class="timer-btn" onclick="startTimer()">开始计时</button>
</div>

<div class="card">
    <div class="card-header">
        <h3 style="margin:0">1. 杠铃俯身划船</h3>
        <span class="tag">4 组 x 8-10 次</span>
    </div>
    <div class="media-box">
        <img src="https://fitnessprogramer.com/wp-content/uploads/2021/02/Barbell-Bent-Over-Row.gif" alt="演示">
    </div>
    <div class="details">
        <div class="guide">核心：保持躯干稳定，大臂贴身体后拉。重点：背部厚度。</div>
        <div class="log-row">
            <input type="number" class="log-input" placeholder="重量 (KG)">
            <input type="number" class="log-input" placeholder="次数">
        </div>
    </div>
</div>

<div class="card">
    <div class="card-header">
        <h3 style="margin:0">2. 高位下拉</h3>
        <span class="tag">4 组 x 12 次</span>
    </div>
    <div class="media-box">
        <img src="https://fitnessprogramer.com/wp-content/uploads/2021/02/Lat-Pulldown.gif" alt="演示">
    </div>
    <div class="details">
        <div class="guide">核心：沉肩发力，肘向侧下方插。重点：背部宽度。</div>
        <div class="log-row">
            <input type="number" class="log-input" placeholder="重量 (KG)">
            <input type="number" class="log-input" placeholder="次数">
        </div>
    </div>
</div>

<div class="card">
    <div class="card-header">
        <h3 style="margin:0">3. 引体向上 (辅助)</h3>
        <span class="tag">3 组 x 力竭</span>
    </div>
    <div class="media-box">
        <img src="https://fitnessprogramer.com/wp-content/uploads/2021/02/Pull-up.gif" alt="演示">
    </div>
</div>

<div class="card">
    <div class="card-header">
        <h3 style="margin:0">4. 坐姿划船</h3>
        <span class="tag">3 组 x 15 次</span>
    </div>
    <div class="media-box">
        <img src="https://fitnessprogramer.com/wp-content/uploads/2021/02/Seated-Cable-Row.gif" alt="演示">
    </div>
</div>

<div class="footer-nav">
    <a href="#" class="nav-item active">训练</a>
    <a href="#" class="nav-item">数据</a>
    <a href="#" class="nav-item">计划</a>
</div>

<script>
    let timeLeft = 60;
    let timerId = null;

    function startTimer() {
        if (timerId) clearInterval(timerId);
        timeLeft = 60;
        document.getElementById('timer').innerText = timeLeft + 's';
        timerId = setInterval(() => {
            timeLeft--;
            document.getElementById('timer').innerText = timeLeft + 's';
            if (timeLeft <= 0) {
                clearInterval(timerId);
                alert('休息结束，开始下一组！');
            }
        }, 1000);
    }
</script>

</body>
</html>
