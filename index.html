<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>背部训练实战手册</title>
    <style>
        body { font-family: sans-serif; background-color: #121212; color: #eee; margin: 0; padding: 15px; }
        .card { background: #1e1e1e; border-radius: 10px; padding: 15px; margin-bottom: 20px; border-left: 4px solid #3498db; }
        h1 { color: #3498db; text-align: center; font-size: 22px; }
        h3 { margin-top: 0; font-size: 18px; }
        /* 强制图片显示，如果加载不出会显示灰色背景 */
        .demo-img { 
            width: 100%; 
            height: auto; 
            min-height: 200px;
            background-color: #333;
            border-radius: 6px; 
            margin: 10px 0;
            display: block;
        }
        .tips { font-size: 14px; color: #bbb; line-height: 1.6; }
        .tag { background: #3498db; color: #white; padding: 2px 8px; border-radius: 4px; font-size: 12px; float: right; }
    </style>
</head>
<body>

    <h1>V型背部日训练计划</h1>

    <div class="card">
        <span class="tag">4 组 x 10次</span>
        <h3>1. 杠铃俯身划船</h3>
        <img class="demo-img" src="https://fitnessprogramer.com/wp-content/uploads/2021/02/Barbell-Bent-Over-Row.gif" alt="动作演示">
        <div class="tips">
            <b>要点：</b>俯身约45度，背挺直。手肘向后上方带，挤压肩胛骨。
        </div>
    </div>

    <div class="card">
        <span class="tag">4 组 x 12次</span>
        <h3>2. 高位下拉</h3>
        <img class="demo-img" src="https://fitnessprogramer.com/wp-content/uploads/2021/02/Lat-Pulldown.gif" alt="动作演示">
        <div class="tips">
            <b>要点：</b>沉肩，想象用手肘去插后裤兜。下拉至上胸口。
        </div>
    </div>

    <div class="card">
        <span class="tag">3 组 x 15次</span>
        <h3>3. 坐姿划船</h3>
        <img class="demo-img" src="https://fitnessprogramer.com/wp-content/uploads/2021/02/Seated-Cable-Row.gif" alt="动作演示">
        <div class="tips">
            <b>要点：</b>拉到底时挺胸，两个肩膀向后夹紧。
        </div>
    </div>

    <p style="text-align: center; color: #555; font-size: 12px;">yjlnp041231 专用系统 | 稳定版 6.0</p>

</body>
</html>
